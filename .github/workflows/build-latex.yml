name: Build LaTeX

on:
  pull_request:
    paths:
      - '**/*.tex'
      - '**/*.cls'
      - '**/*.sty'
      - '**/*.bib'
      - 'sharedAssets/**'
      - '.github/workflows/build-latex.yml'
  push:
    branches: [main]
    paths:
      - '**/*.tex'
      - '**/*.cls'
      - '**/*.sty'
      - '**/*.bib'
      - 'sharedAssets/**'
      - '.github/workflows/build-latex.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build all documents
        uses: xu-cheng/latex-action@v3
        with:
          root_file: |
            HowToThesis/notes.tex
            ThesisTemplate/notes.tex
            ThesisRoadmap/notes.tex
            1_Artifact/notes.tex
            2_Artifact/notes.tex
            3_Artifact/notes.tex
          work_in_root_file_dir: true
          continue_on_error: false

      - name: Upload built PDFs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdfs
          path: '**/notes.pdf'
          if-no-files-found: error
          retention-days: 14

      - name: Commit rebuilt PDFs back to main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'ci: rebuild PDFs [skip ci]'
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          file_pattern: '**/notes.pdf'

name: LaTeX syntax check

on:
  pull_request:
    paths:
      - '**/*.tex'
      - '**/*.cls'
      - '**/*.sty'
      - 'sharedAssets/**'
      - '.github/workflows/build-latex.yml'
  push:
    branches: [main]
    paths:
      - '**/*.tex'
      - '**/*.cls'
      - '**/*.sty'
      - 'sharedAssets/**'
      - '.github/workflows/build-latex.yml'

jobs:
  syntax:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        doc:
          - HowToThesis
          - ThesisTemplate
          - ThesisRoadmap
          - 1_Artifact
          - 2_Artifact
          - 3_Artifact
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Syntax check ${{ matrix.doc }}/notes.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: notes.tex
          working_directory: ${{ matrix.doc }}
          compiler: pdflatex
          args: -draftmode -halt-on-error -interaction=nonstopmode -file-line-error
